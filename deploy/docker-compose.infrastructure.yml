services:
  postgres:
    image: postgres:17
    container_name: flashdrop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: thanhdat123
    ports:
      - "5432:5432"
    volumes:
      - flashdrop-postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flashdrop-redis
    ports:
      - "6379:6379"
    volumes:
      - flashdrop-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: flashdrop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - flashdrop-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  flashdrop-postgres-data:
  flashdrop-redis-data:
  flashdrop-rabbitmq-data: